<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps Route Sender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Maps Route Sender</h1>
    <p class="subtitle">経路を検索してスマホに送信</p>

    <!-- 経路入力セクション -->
    <section class="card">
      <h2>経路検索</h2>
      <div class="form-group">
        <label for="origin">出発地</label>
        <input type="text" id="origin" placeholder="例: 東京駅">
      </div>
      <div class="form-group">
        <label for="destination">目的地</label>
        <input type="text" id="destination" placeholder="例: 渋谷駅">
      </div>
      <div class="form-group">
        <label>移動手段</label>
        <div class="travel-modes">
          <label class="mode-option">
            <input type="radio" name="travelMode" value="transit" checked>
            <span>🚃 電車</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="travelMode" value="driving">
            <span>🚗 車</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="travelMode" value="walking">
            <span>🚶 徒歩</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="travelMode" value="bicycling">
            <span>🚲 自転車</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>日時指定（任意）</label>
        <div class="time-type-options">
          <label><input type="radio" name="timeType" value="now" checked> <span>今すぐ</span></label>
          <label><input type="radio" name="timeType" value="depart"> <span>出発時刻</span></label>
          <label><input type="radio" name="timeType" value="arrive"> <span>到着時刻</span></label>
        </div>
        <div class="datetime-selects" id="datetimeSelects" style="display:none">
          <input type="date" id="dateInput">
          <select id="hourSelect"></select>
          <span class="separator">:</span>
          <select id="minuteSelect"></select>
        </div>
      </div>

      <div class="actions">
        <button id="sendBtn" class="btn primary" disabled>スマホに送信</button>
        <button id="openBtn" class="btn secondary">このブラウザで開く</button>
      </div>

      <div id="sendStatus" class="status" hidden></div>

      <div id="mapArea" class="map-area" hidden>
        <h3>経路プレビュー</h3>
        <iframe id="mapFrame" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </section>

    <!-- デバイス登録セクション -->
    <section class="card">
      <h2>デバイス登録</h2>
      <p class="hint">スマホでこのページを開いて通知を許可すると、PCから経路を送信できます。</p>

      <div class="form-group">
        <label for="deviceName">デバイス名</label>
        <input type="text" id="deviceName" placeholder="例: 自分のスマホ">
      </div>

      <button id="subscribeBtn" class="btn primary">このデバイスで通知を受け取る</button>
      <div id="subscribeStatus" class="status" hidden></div>

      <div id="deviceList" class="device-list" hidden>
        <h3>登録済みデバイス</h3>
        <ul id="devices"></ul>
      </div>
    </section>

    <div style="text-align:center;margin-top:1.5rem">
      <a href="qr.html" style="color:#666;font-size:0.85rem">サーバー不要のQRコード版はこちら</a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
