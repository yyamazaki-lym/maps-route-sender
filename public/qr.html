<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps Route Sender - QR</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .qr-area {
      margin-top: 1.5rem;
      text-align: center;
    }
    .qr-area canvas {
      border-radius: 12px;
      background: #fff;
      padding: 12px;
    }
    .maps-link {
      display: inline-block;
      margin-top: 0.8rem;
      color: #4ecdc4;
      font-size: 0.85rem;
      word-break: break-all;
    }
    .nav-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .nav-link a {
      color: #666;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container wide">
    <h1>Maps Route Sender</h1>
    <p class="subtitle">経路をQRコードでスマホに送信</p>

    <section class="card">
      <h2>経路検索</h2>
      <div class="form-group">
        <label for="origin">出発地</label>
        <input type="text" id="origin" placeholder="例: 東京駅">
      </div>
      <div class="form-group">
        <label for="destination">目的地</label>
        <input type="text" id="destination" placeholder="例: 渋谷駅">
      </div>
      <div class="form-group">
        <label>移動手段</label>
        <div class="travel-modes">
          <label class="mode-option">
            <input type="radio" name="travelMode" value="transit" checked>
            <span>🚃 電車</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="travelMode" value="driving">
            <span>🚗 車</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="travelMode" value="walking">
            <span>🚶 徒歩</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="travelMode" value="bicycling">
            <span>🚲 自転車</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>日時指定（任意）</label>
        <div class="time-type-options">
          <label><input type="radio" name="timeType" value="now" checked> <span>今すぐ</span></label>
          <label><input type="radio" name="timeType" value="depart"> <span>出発時刻</span></label>
          <label><input type="radio" name="timeType" value="arrive"> <span>到着時刻</span></label>
        </div>
        <div class="datetime-selects" id="datetimeSelects" style="display:none">
          <input type="date" id="dateInput">
          <select id="hourSelect"></select>
          <span class="separator">:</span>
          <select id="minuteSelect"></select>
        </div>
      </div>

      <div class="actions">
        <button id="generateBtn" class="btn primary">QRコード生成</button>
        <button id="openBtn" class="btn secondary">このブラウザで開く</button>
      </div>

    </section>

    <div id="resultRow" class="result-row" style="display:none">
      <div class="qr-area">
        <canvas id="qrCanvas"></canvas>
        <br>
        <a id="mapsLink" class="maps-link" href="#" target="_blank" rel="noopener"></a>
      </div>
      <div class="map-area">
        <h3>経路プレビュー</h3>
        <iframe id="mapFrame" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>

    <div class="nav-link">
      <a href="index.html">Push通知版はこちら（サーバー必要）</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    const originInput = document.getElementById("origin");
    const destInput = document.getElementById("destination");
    const dateInput = document.getElementById("dateInput");
    const hourSelect = document.getElementById("hourSelect");
    const minuteSelect = document.getElementById("minuteSelect");
    const datetimeSelects = document.getElementById("datetimeSelects");
    const timeTypeRadios = document.querySelectorAll('input[name="timeType"]');
    const generateBtn = document.getElementById("generateBtn");
    const openBtn = document.getElementById("openBtn");
    const resultRow = document.getElementById("resultRow");
    const qrCanvas = document.getElementById("qrCanvas");
    const mapsLink = document.getElementById("mapsLink");
    const mapFrame = document.getElementById("mapFrame");

    // 時・分のプルダウンを生成
    for (let h = 0; h < 24; h++) {
      const opt = document.createElement("option");
      opt.value = h;
      opt.textContent = String(h).padStart(2, "0");
      hourSelect.appendChild(opt);
    }
    for (let m = 0; m < 60; m += 5) {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = String(m).padStart(2, "0");
      minuteSelect.appendChild(opt);
    }

    // 「今すぐ」以外を選んだらプルダウンを表示
    timeTypeRadios.forEach((r) => {
      r.addEventListener("change", () => {
        const isNow = document.querySelector('input[name="timeType"]:checked').value === "now";
        datetimeSelects.style.display = isNow ? "none" : "flex";
        if (!isNow && !dateInput.value) {
          const now = new Date();
          dateInput.value = now.toISOString().slice(0, 10);
          hourSelect.value = now.getHours();
          // 最も近い5分刻みにする
          minuteSelect.value = Math.round(now.getMinutes() / 5) * 5 % 60;
        }
      });
    });

    // 選択された日時をDateオブジェクトで取得
    function getSelectedDatetime() {
      if (!dateInput.value) return null;
      return new Date(
        dateInput.value + "T" +
        String(hourSelect.value).padStart(2, "0") + ":" +
        String(minuteSelect.value).padStart(2, "0")
      );
    }

    // Google Maps経路URLを生成（日時対応）
    function buildMapsUrl() {
      const origin = originInput.value.trim();
      const destination = destInput.value.trim();
      const travelMode = document.querySelector('input[name="travelMode"]:checked').value;
      const timeType = document.querySelector('input[name="timeType"]:checked').value;
      if (!origin || !destination) return null;

      if (timeType !== "now") {
        const dt = getSelectedDatetime();
        if (dt) {
          const dirflg = { transit: "r", driving: "d", walking: "w", bicycling: "b" }[travelMode] || "r";
          const mm = String(dt.getMonth() + 1).padStart(2, "0");
          const dd = String(dt.getDate()).padStart(2, "0");
          const yyyy = dt.getFullYear();
          const hours = dt.getHours();
          const minutes = String(dt.getMinutes()).padStart(2, "0");
          const ampm = hours >= 12 ? "pm" : "am";
          const h12 = hours % 12 || 12;
          const ttype = timeType === "arrive" ? "arr" : "dep";

          return (
            `https://www.google.com/maps?` +
            `saddr=${encodeURIComponent(origin)}` +
            `&daddr=${encodeURIComponent(destination)}` +
            `&dirflg=${dirflg}` +
            `&ttype=${ttype}` +
            `&date=${mm}/${dd}/${yyyy}` +
            `&time=${h12}:${minutes}${ampm}`
          );
        }
      }

      return (
        `https://www.google.com/maps/dir/?api=1` +
        `&origin=${encodeURIComponent(origin)}` +
        `&destination=${encodeURIComponent(destination)}` +
        `&travelmode=${travelMode}`
      );
    }

    // 表示用テキスト
    function buildLabel() {
      const timeType = document.querySelector('input[name="timeType"]:checked').value;
      let label = `${originInput.value.trim()} → ${destInput.value.trim()}`;
      if (timeType !== "now") {
        const dt = getSelectedDatetime();
        if (dt) {
          const prefix = timeType === "arrive" ? "到着" : "出発";
          label += `\n${prefix}: ${dt.toLocaleString("ja-JP")}`;
        }
      }
      return label;
    }

    // iframe埋め込み用URLを生成
    function buildEmbedUrl() {
      const origin = originInput.value.trim();
      const destination = destInput.value.trim();
      const travelMode = document.querySelector('input[name="travelMode"]:checked').value;
      if (!origin || !destination) return null;
      const dirflg = { transit: "r", driving: "d", walking: "w", bicycling: "b" }[travelMode] || "r";
      return (
        `https://www.google.com/maps?` +
        `saddr=${encodeURIComponent(origin)}` +
        `&daddr=${encodeURIComponent(destination)}` +
        `&dirflg=${dirflg}` +
        `&output=embed`
      );
    }

    generateBtn.addEventListener("click", () => {
      const url = buildMapsUrl();
      if (!url) return;

      QRCode.toCanvas(qrCanvas, url, {
        width: 280,
        margin: 1,
        color: { dark: "#000000", light: "#ffffff" },
      });

      mapsLink.href = url;
      mapsLink.textContent = buildLabel();

      // 地図プレビューを表示
      const embedUrl = buildEmbedUrl();
      if (embedUrl) {
        mapFrame.src = embedUrl;
      }
      resultRow.style.display = "flex";
    });

    openBtn.addEventListener("click", () => {
      const url = buildMapsUrl();
      if (url) window.open(url, "_blank");
    });

    // Enter キーでQR生成
    document.querySelectorAll("input[type=text]").forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") generateBtn.click();
      });
    });
  </script>
</body>
</html>
